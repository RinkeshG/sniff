<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -180 540 205" role="img" aria-label="sniff">
  <title>sniff — Sniff wordmark</title>
  <!--
    Sniff wordmark. Letters are real Young Serif outlines (no font dependency).
    The "i" is the dotless glyph; its tittle is a single ginger dot, matched to
    Young Serif's own tittle (Ø0.16em) and sitting 0.62em above the baseline so
    it reads as type and floats clearly above the stem.
      • Wordmark colour: #2A2725 (charcoal) on light  ·  #F5F0E5 (cream) on dark
      • Dot colour: #E08A3A (ginger) on any background
    To recolour: change .wm fill.  For a static mark: delete the blink block below.
  -->
  <style>
    .wm  { fill: #2A2725; }
    .dot { fill: #E08A3A; }
    /* gentle slow blink — a cat's nod. shrinks about its own centre, stays put. */
    .dot { transform-box: fill-box; transform-origin: center; animation: sniffBlink 5.5s ease-in-out infinite; }
    @keyframes sniffBlink { 0%,82%,100% { transform: scaleY(1); } 90% { transform: scaleY(0.16); } 96% { transform: scaleY(1); } }
  </style>
